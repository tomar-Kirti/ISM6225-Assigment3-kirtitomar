<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Add a New Book — The Reading Room</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Merriweather:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark navbar-site">
      <div class="container">
        <a class="navbar-brand" href="index.html">The Reading Room</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#mainNav"
          aria-controls="mainNav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
            <li class="nav-item"><a class="nav-link" href="books.html">Books</a></li>
            <li class="nav-item">
              <a class="nav-link" href="visualizations.html">Visualizations</a>
            </li>
            <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
            <li class="nav-item"><a class="nav-link" href="mybot.html">Chat with Bot</a></li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="py-5">
      <div class="container" style="max-width: 540px">
        <h1 class="h2 mb-4">Add a New Book</h1>
        <form
          class="feature-card p-4 mb-3"
          action="#"
          method="post"
          onsubmit="event.preventDefault(); alert('This feature will be available in the full application.');"
        >
          <div class="mb-3">
            <label class="form-label" for="title">Title</label>
            <input class="form-control" type="text" id="title" name="title" required />
          </div>
          <div class="mb-3">
            <label class="form-label" for="author">Author</label>
            <input class="form-control" type="text" id="author" name="author" required />
          </div>
          <div class="mb-3">
            <label class="form-label" for="genre">Genre</label>
            <input class="form-control" type="text" id="genre" name="genre" required />
          </div>
          <div class="mb-3">
            <label class="form-label" for="year">Year</label>
            <input class="form-control" type="number" id="year" name="year" min="0" required />
          </div>
          <div class="mb-3">
            <label class="form-label" for="rating">Rating</label>
            <input
              class="form-control"
              type="number"
              id="rating"
              name="rating"
              step="0.1"
              min="0"
              max="5"
              required
            />
          </div>
          <div class="mb-4">
            <label class="form-label" for="pages">Pages</label>
            <input class="form-control" type="number" id="pages" name="pages" min="1" required />
          </div>
          <button type="submit" class="btn btn-gold">Submit</button>
        </form>
        <p class="text-muted small mb-4">
          In the final version, this form will insert a new record into the database.
        </p>

        <div class="crud-nav d-flex flex-wrap gap-2 justify-content-center">
          <a class="btn btn-gold" href="crud-create.html">Add Book</a>
          <a class="btn btn-gold" href="books.html">View Catalog</a>
          <a class="btn btn-gold" href="crud-update.html">Edit Book</a>
          <a class="btn btn-gold" href="crud-delete.html">Remove Book</a>
        </div>
      </div>
    </main>

    <footer class="site-footer">
      <div class="container">© 2025 The Reading Room</div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.botpress.cloud/webchat/v3.6/inject.js"></script>
    <script src="https://files.bpcontent.cloud/2026/04/10/22/20260410220316-DQ32VWR5.js" defer></script>
  </body>
</html>
