<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Book Insights — The Reading Room</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Merriweather:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark navbar-site">
      <div class="container">
        <a class="navbar-brand" href="index.html">📚 The Reading Room</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#mainNav"
          aria-controls="mainNav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
            <li class="nav-item"><a class="nav-link" href="books.html">Books</a></li>
            <li class="nav-item">
              <a class="nav-link active" aria-current="page" href="visualizations.html"
                >Visualizations</a
              >
            </li>
            <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
            <li class="nav-item"><a class="nav-link" href="mybot.html">Chat with Bot</a></li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="py-5">
      <div class="container">
        <h1 class="h2 mb-4">Book Insights</h1>
        <div class="row g-4">
          <div class="col-lg-4">
            <div class="card feature-card chart-card h-100">
              <div class="card-body">
                <h2 class="h5 card-title text-center mb-3">Average Rating by Genre</h2>
                <div class="chart-wrap">
                  <canvas id="chartGenreRating" height="280"></canvas>
                </div>
              </div>
            </div>
          </div>
          <div class="col-lg-4">
            <div class="card feature-card chart-card h-100">
              <div class="card-body">
                <h2 class="h5 card-title text-center mb-3">Books by Genre</h2>
                <div class="chart-wrap">
                  <canvas id="chartGenrePie" height="280"></canvas>
                </div>
              </div>
            </div>
          </div>
          <div class="col-lg-4">
            <div class="card feature-card chart-card h-100">
              <div class="card-body">
                <h2 class="h5 card-title text-center mb-3">Books by Publication Decade</h2>
                <div class="chart-wrap">
                  <canvas id="chartDecade" height="280"></canvas>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <footer class="site-footer">
      <div class="container">© 2025 The Reading Room</div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.6/dist/chart.umd.min.js"></script>
    <script>
      (function () {
        const brown = "#3B1F0E";
        const gold = "#C9A84C";

        new Chart(document.getElementById("chartGenreRating"), {
          type: "bar",
          data: {
            labels: [
              "Fantasy",
              "Sci-Fi",
              "Dystopia",
              "Non-Fiction",
              "Fiction",
              "Self-Help",
              "Thriller",
              "Memoir",
              "Literary Fiction",
            ],
            datasets: [
              {
                label: "Average rating",
                data: [4.7, 4.65, 4.5, 4.4, 3.85, 4.7, 4.0, 4.7, 4.15],
                backgroundColor: gold,
                borderColor: brown,
                borderWidth: 2,
              },
            ],
          },
          options: {
            responsive: true,
            maintainAspectRatio: true,
            plugins: {
              legend: { display: false },
              tooltip: { enabled: true },
            },
            scales: {
              y: {
                beginAtZero: true,
                max: 5,
                ticks: { stepSize: 0.5 },
              },
            },
          },
        });

        new Chart(document.getElementById("chartGenrePie"), {
          type: "pie",
          data: {
            labels: [
              "Fantasy",
              "Sci-Fi",
              "Dystopia",
              "Non-Fiction",
              "Fiction",
              "Self-Help",
              "Thriller",
              "Memoir",
              "Literary Fiction",
            ],
            datasets: [
              {
                data: [1, 4, 2, 3, 2, 2, 3, 1, 2],
                backgroundColor: [
                  "#C9A84C",
                  "#8B5E3C",
                  "#D4A574",
                  "#E8D4B8",
                  "#A67C52",
                  "#F0E6D2",
                  "#6B4423",
                  "#DEB887",
                  "#CD853F",
                ],
                borderColor: "#FDF6EC",
                borderWidth: 2,
              },
            ],
          },
          options: {
            responsive: true,
            maintainAspectRatio: true,
            plugins: {
              legend: { position: "bottom" },
              tooltip: { enabled: true },
            },
          },
        });

        new Chart(document.getElementById("chartDecade"), {
          type: "line",
          data: {
            labels: ["1930s", "1940s", "1960s", "1980s", "2000s", "2010s", "2020s"],
            datasets: [
              {
                label: "Books",
                data: [1, 1, 1, 2, 2, 11, 2],
                borderColor: gold,
                backgroundColor: "rgba(201, 168, 76, 0.15)",
                pointBackgroundColor: brown,
                pointBorderColor: brown,
                pointRadius: 5,
                pointHoverRadius: 7,
                borderWidth: 2,
                fill: false,
                tension: 0.2,
              },
            ],
          },
          options: {
            responsive: true,
            maintainAspectRatio: true,
            plugins: {
              legend: { display: false },
              tooltip: { enabled: true },
            },
            scales: {
              y: {
                beginAtZero: true,
                ticks: { stepSize: 1 },
              },
            },
          },
        });
      })();
    </script>
  </body>
</html>
